name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cmake-generator: "Ninja"
          - os: macos-14
            cmake-generator: "Ninja"
          - os: windows-2022
            cmake-generator: "Visual Studio 17 2022"
        build-type: [debug, release-with-tests]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
      
      - name: Configure
        run: cmake --preset=${{ matrix.build-type }} -G "${{ matrix.cmake-generator }}"
      
      - name: Build
        run: cmake --build --preset=${{ matrix.build-type }}
      
      - name: Test
        run: ctest --preset=${{ matrix.build-type }}