name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        build-type: [debug, release-with-tests]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
      
      - name: Configure
        run: |
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            cmake --preset=${{ matrix.build-type }} -G "Visual Studio 17 2022"
          else
            cmake --preset=${{ matrix.build-type }}
          fi
        shell: bash
      
      - name: Build
        run: cmake --build --preset=${{ matrix.build-type }}
      
      - name: Test
        run: ctest --preset=${{ matrix.build-type }}